<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      No Sanitizer Page
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large" class="ion-text-nowrap">
        Not Sanitized html
      </ion-title>
    </ion-toolbar>
  </ion-header>

  <app-explore-container name="This is the page without sanitized the html"
                         [contentOnModal]="contentOnModal"
                         [contentOnPage]="">
  </app-explore-container>

  <div [innerHTML]="contentOnPage" style="color: green"></div>
</ion-content>
